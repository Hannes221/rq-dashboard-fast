{% extends "base.html" %}

{% block page_title %}Export · RQ Dashboard{% endblock %}

{% block content %}
<section class="page-header">
  <h2>Export</h2>
  <p class="page-subtitle">Download queues, workers, or jobs data in CSV or JSON.</p>
</section>

<section class="section">
  <table id="export" class="data-table">
    <thead>
      <tr>
        <th>Queues</th>
        <th>Workers</th>
        <th>Jobs</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <div class="export-control">
            <button class="button button--accent js-export-trigger" data-export-target="queues">
              Export queues
            </button>
            <label class="sr-only" for="export-queues-format">Format</label>
            <select class="export-select" id="export-queues-format" data-export-format="queues">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
        <td>
          <div class="export-control">
            <button class="button button--accent js-export-trigger" data-export-target="workers">
              Export workers
            </button>
            <label class="sr-only" for="export-workers-format">Format</label>
            <select class="export-select" id="export-workers-format" data-export-format="workers">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
        <td>
          <div class="export-control">
            <button class="button button--accent js-export-trigger" data-export-target="jobs">
              Export jobs
            </button>
            <label class="sr-only" for="export-jobs-format">Format</label>
            <select class="export-select" id="export-jobs-format" data-export-format="jobs">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
  (function () {
    const { baseUrl, notify, notifyError } = window.dashboard;

    const triggerDownload = (blob, filename) => {
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.URL.revokeObjectURL(url);
    };

    const exportData = async (target, format) => {
      try {
        if (format === 'csv') {
          const response = await fetch(`${baseUrl}/export/${target}`);
          if (!response.ok) {
            throw new Error('CSV export failed');
          }
          const blob = await response.blob();
          triggerDownload(blob, `${target}_data.csv`);
          notify(`Exported ${target} to CSV`);
          return;
        }

        const response = await fetch(`${baseUrl}/${target}/json`);
        if (!response.ok) {
          throw new Error('JSON export failed');
        }
        const data = await response.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], {
          type: 'application/json',
        });
        triggerDownload(blob, `${target}_data.json`);
        notify(`Exported ${target} to JSON`);
      } catch (error) {
        console.error(error);
        notifyError(`Error exporting ${target}`);
      }
    };

    document.querySelectorAll('.js-export-trigger').forEach((button) => {
      button.addEventListener('click', (event) => {
        const target = event.currentTarget.dataset.exportTarget;
        const formatSelect = document.querySelector(`[data-export-format="${target}"]`);
        const format = formatSelect ? formatSelect.value : 'csv';
        exportData(target, format);
      });
    });
  })();
</script>
{% endblock %}
