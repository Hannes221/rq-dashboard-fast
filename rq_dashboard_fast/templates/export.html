{% extends "base.html" %}

{% block title %}Export · RQ Dashboard{% endblock %}

{% block content %}
<section class="page-header">
  <h2>Export Data</h2>
  <p>Download the latest queues, workers, or jobs data as CSV or JSON.</p>
</section>

<section class="section">
  <div class="export-grid">
    <article class="export-card">
      <h3>Queues</h3>
      <select id="export-queues-format">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
      </select>
      <button class="btn btn--primary" data-export="queues">Export queues</button>
    </article>
    <article class="export-card">
      <h3>Workers</h3>
      <select id="export-workers-format">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
      </select>
      <button class="btn btn--primary" data-export="workers">Export workers</button>
    </article>
    <article class="export-card">
      <h3>Jobs</h3>
      <select id="export-jobs-format">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
      </select>
      <button class="btn btn--primary" data-export="jobs">Export jobs</button>
    </article>
  </div>
</section>
{% endblock %}

{% block page_scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const baseUrl = DashboardUI.getBaseUrl();
    const buttons = document.querySelectorAll('[data-export]');

    const exportAsCsv = async (resource) => {
      const response = await fetch(`${baseUrl}/export/${resource}`);
      if (!response.ok) {
        throw new Error('Failed to export CSV');
      }
      const blob = await response.blob();
      DashboardUI.downloadBlob(blob, `${resource}_data.csv`);
    };

    const exportAsJson = async (resource) => {
      const response = await fetch(`${baseUrl}/${resource}/json`);
      if (!response.ok) {
        throw new Error('Failed to export JSON');
      }
      const data = await response.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: 'application/json',
      });
      DashboardUI.downloadBlob(blob, `${resource}_data.json`);
    };

    const handleExport = async (resource) => {
      const format = document.getElementById(`export-${resource}-format`).value;
      try {
        if (format === 'csv') {
          await exportAsCsv(resource);
        } else {
          await exportAsJson(resource);
        }
        DashboardUI.showNotification(`Exported ${resource}`);
      } catch (error) {
        console.error(error);
        DashboardUI.showError(`Unable to export ${resource}.`);
      }
    };

    buttons.forEach((button) => {
      button.addEventListener('click', () => handleExport(button.dataset.export));
    });
  });
</script>
{% endblock %}
