{% extends "base.html" %}

{% block title %}Export Data | RQ Dashboard FastAPI{% endblock %}

{% block content %}
<section class="section">
  <div class="page-header">
    <div>
      <h2>Export Data</h2>
      <p class="page-description">
        Download queues, workers, or jobs as CSV or JSON for deeper analysis.
      </p>
    </div>
  </div>

  <table id="export" class="export-table">
    <thead>
      <tr>
        <th scope="col">Export Queues</th>
        <th scope="col">Export Workers</th>
        <th scope="col">Export Jobs</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <div class="export-option">
            <button class="export-button" data-export-type="queues">Export queues</button>
            <select class="export-select" id="export-queues-format">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
        <td>
          <div class="export-option">
            <button class="export-button" data-export-type="workers">Export workers</button>
            <select class="export-select" id="export-workers-format">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
        <td>
          <div class="export-option">
            <button class="export-button" data-export-type="jobs">Export jobs</button>
            <select class="export-select" id="export-jobs-format">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const { buildBaseUrl, showNotification, showErrorNotification } = window.dashboardHelpers;
    const protocol = '{{ protocol }}';
    const prefix = '{{ prefix|default('', true) }}';
    const baseUrl = buildBaseUrl(protocol, prefix);

    const fileNames = {
      queues: 'queues_data',
      workers: 'workers_data',
      jobs: 'jobs_data',
    };

    const downloadBlob = (blob, filename) => {
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    };

    const exportAsCsv = (type) => {
      fetch(`${baseUrl}/export/${type}`)
        .then((response) => {
          if (!response.ok) {
            throw new Error();
          }
          return response.blob();
        })
        .then((blob) => {
          downloadBlob(blob, `${fileNames[type]}.csv`);
          showNotification(`Exported ${type} as CSV`);
        })
        .catch(() => showErrorNotification(`Error exporting ${type} as CSV`));
    };

    const exportAsJson = (type) => {
      fetch(`${baseUrl}/${type}/json`)
        .then((response) => {
          if (!response.ok) {
            throw new Error();
          }
          return response.json();
        })
        .then((data) => {
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: 'application/json',
          });
          downloadBlob(blob, `${fileNames[type]}.json`);
          showNotification(`Exported ${type} as JSON`);
        })
        .catch(() => showErrorNotification(`Error exporting ${type} as JSON`));
    };

    const handleExport = (type) => {
      const format = document.getElementById(`export-${type}-format`).value;
      if (format === 'csv') {
        exportAsCsv(type);
      } else {
        exportAsJson(type);
      }
    };

    document.querySelectorAll('[data-export-type]').forEach((button) => {
      button.addEventListener('click', () => handleExport(button.dataset.exportType));
    });
  });
</script>
{% endblock %}
