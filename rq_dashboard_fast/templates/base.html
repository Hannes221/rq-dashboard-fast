<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}RQ Dashboard · FastAPI{% endblock %}</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/main.css" />
    {% block head %}{% endblock %}
  </head>

  <body>
    {% include "header.html" %}
    <main>{% block content %}{% endblock %}</main>
    {% include "footer.html" %}

    <script>
      window.dashboardConfig = {
        protocol: '{{ protocol }}',
        prefix: '{{ prefix }}',
      };
    </script>
    <script defer src="{{ prefix }}/static/js/dashboard.js"></script>
    {% block page_scripts %}{% endblock %}
  </body>
</html>
